name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

# Auto-cancel superseded runs when a PR is updated.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Run pre-commit
        run: uvx pre-commit run --all-files --show-diff-on-failure

  tests:
    name: tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --group tests --python ${{ matrix.python-version }}
      - name: Run pytest
        run: uv run pytest

  remote-tests:
    name: remote-data (CNN weights)
    runs-on: ubuntu-latest
    # A HuggingFace outage must not block merges: this job is informative only.
    continue-on-error: true
    # Bound the network I/O so a hung download can't tie up a runner; the weights
    # are a small .npz, so this is generous headroom rather than a tight budget.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --group tests --python 3.12
      - name: Run remote-data tests
        run: uv run pytest -m remote_data --remote-data=any
