name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Run pre-commit
        run: uvx pre-commit run --all-files --show-diff-on-failure

  tests:
    name: tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Configure git auth for private dependency
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.ST_PIPELINE_TOKEN }}@github.com/".insteadOf \
            "https://github.com/"
      - name: Install dependencies
        run: uv sync --group tests --python ${{ matrix.python-version }}
      - name: Run pytest
        run: uv run pytest

  remote-tests:
    name: remote-data smoke (CNN weights)
    runs-on: ubuntu-latest
    # A HuggingFace outage must not block merges: this job is informative only.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Configure git auth for private dependency
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.ST_PIPELINE_TOKEN }}@github.com/".insteadOf \
            "https://github.com/"
      - name: Install dependencies
        run: uv sync --group tests --python 3.12
      - name: Run remote-data tests
        run: uv run pytest -m remote_data --remote-data=any
